<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building a RISC-V OS from Scratch</title>
<style>
  :root {
    --bg: #fafaf9;
    --bg-sidebar: #f5f5f4;
    --bg-card: #ffffff;
    --text: #1c1917;
    --text-muted: #78716c;
    --text-faint: #a8a29e;
    --border: #e7e5e4;
    --accent: #b45309;
    --accent-light: #fef3c7;
    --accent-hover: #92400e;
    --code-bg: #f5f5f4;
    --code-border: #e7e5e4;
    --link: #b45309;
    --sidebar-active: #fef3c7;
    --sidebar-hover: #fafaf9;
    --scrollbar: #d6d3d1;
    --scrollbar-hover: #a8a29e;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-serif: 'Georgia', 'Times New Roman', serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  [data-theme="dark"] {
    --bg: #1c1917;
    --bg-sidebar: #1a1816;
    --bg-card: #292524;
    --text: #e7e5e4;
    --text-muted: #a8a29e;
    --text-faint: #78716c;
    --border: #44403c;
    --accent: #f59e0b;
    --accent-light: #451a0310;
    --accent-hover: #fbbf24;
    --code-bg: #292524;
    --code-border: #44403c;
    --link: #f59e0b;
    --sidebar-active: #292524;
    --sidebar-hover: #292524;
    --scrollbar: #44403c;
    --scrollbar-hover: #57534e;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 16px;
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    display: flex;
    height: 100vh;
    overflow: hidden;
    transition: background 0.2s, color 0.2s;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  /* ── Sidebar ── */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    transition: transform 0.25s ease, background 0.2s;
    z-index: 100;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-header h1 {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .sidebar-header p {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .sidebar-search {
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .sidebar-search input {
    width: 100%;
    padding: 8px 12px;
    font-size: 0.8rem;
    font-family: var(--font-sans);
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .sidebar-search input:focus {
    border-color: var(--accent);
  }

  .sidebar-search input::placeholder {
    color: var(--text-faint);
  }

  .chapter-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0 80px;
  }

  .part-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 16px 20px 6px;
  }

  .chapter-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.12s ease;
    text-decoration: none;
    color: var(--text);
  }

  .chapter-item:hover {
    background: var(--sidebar-hover);
  }

  .chapter-item.active {
    background: var(--sidebar-active);
    border-left-color: var(--accent);
  }

  .chapter-item.active .ch-title {
    color: var(--accent);
    font-weight: 600;
  }

  .ch-num {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-faint);
    min-width: 24px;
    padding-top: 2px;
    font-family: var(--font-mono);
  }

  .ch-info {
    flex: 1;
    min-width: 0;
  }

  .ch-title {
    font-size: 0.82rem;
    font-weight: 500;
    line-height: 1.35;
    color: var(--text);
  }

  .ch-difficulty {
    font-size: 0.65rem;
    color: var(--text-faint);
    margin-top: 1px;
  }

  .chapter-item.hidden {
    display: none;
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    font-size: 0.72rem;
    color: var(--text-faint);
  }

  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.75rem;
    font-family: var(--font-sans);
    transition: all 0.15s;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Main Content ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    gap: 16px;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .menu-btn {
    display: none;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1rem;
    line-height: 1;
  }

  .breadcrumb {
    font-size: 0.78rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .breadcrumb span {
    color: var(--text);
    font-weight: 600;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.15s ease;
    width: 0%;
  }

  .content-scroll {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
  }

  .content {
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 40px 120px;
  }

  /* ── Markdown Styles ── */
  .content h1 {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .content h1 + p {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 32px;
    font-weight: 500;
  }

  .content h2 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-top: 56px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.01em;
  }

  .content h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 40px;
    margin-bottom: 12px;
  }

  .content h4 {
    font-size: 0.95rem;
    font-weight: 700;
    margin-top: 32px;
    margin-bottom: 8px;
  }

  .content p {
    margin-bottom: 16px;
    font-family: var(--font-serif);
    font-size: 1.02rem;
    line-height: 1.8;
  }

  .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  .content ul, .content ol {
    margin-bottom: 16px;
    padding-left: 24px;
    font-family: var(--font-serif);
    font-size: 1.02rem;
    line-height: 1.8;
  }

  .content li {
    margin-bottom: 6px;
  }

  .content li p {
    margin-bottom: 6px;
  }

  .content a {
    color: var(--link);
    text-decoration: underline;
    text-decoration-color: var(--link);
    text-underline-offset: 2px;
    transition: opacity 0.1s;
  }

  .content a:hover { opacity: 0.8; }

  .content strong {
    font-weight: 700;
    color: var(--text);
  }

  .content em {
    font-style: italic;
  }

  .content blockquote {
    margin: 24px 0;
    padding: 16px 20px;
    border-left: 3px solid var(--accent);
    background: var(--accent-light);
    border-radius: 0 8px 8px 0;
    font-size: 0.92rem;
  }

  .content blockquote p {
    margin-bottom: 10px;
    font-size: 0.92rem;
    line-height: 1.7;
  }

  .content blockquote p:last-child {
    margin-bottom: 0;
  }

  .content blockquote strong {
    color: var(--accent);
  }

  .content code {
    font-family: var(--font-mono);
    font-size: 0.85em;
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    padding: 2px 6px;
    border-radius: 4px;
    word-break: break-word;
  }

  .content pre {
    margin: 20px 0;
    padding: 20px;
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-radius: 8px;
    overflow-x: auto;
    line-height: 1.55;
  }

  .content pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.82rem;
    word-break: normal;
  }

  .content table {
    width: 100%;
    margin: 20px 0;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  .content th {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 2px solid var(--border);
    font-weight: 700;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    font-family: var(--font-sans);
  }

  .content td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-sans);
    font-size: 0.88rem;
    line-height: 1.5;
  }

  .content tr:hover td {
    background: var(--bg-sidebar);
  }

  .content img {
    max-width: 100%;
    border-radius: 8px;
  }

  /* ── Collapsible Q&A Dropdowns ── */
  .content details {
    margin: 20px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .content details[open] {
    border-color: var(--accent);
  }

  .content details summary {
    padding: 14px 18px;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text);
    background: var(--bg-sidebar);
    list-style: none;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.12s;
    line-height: 1.4;
    user-select: none;
  }

  .content details summary::-webkit-details-marker {
    display: none;
  }

  .content details summary::before {
    content: '▶';
    font-size: 0.65rem;
    color: var(--accent);
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .content details[open] summary::before {
    transform: rotate(90deg);
  }

  .content details summary:hover {
    background: var(--accent-light);
  }

  .content details > div,
  .content details > p {
    padding: 16px 18px;
    border-top: 1px solid var(--border);
    font-family: var(--font-serif);
    font-size: 0.95rem;
    line-height: 1.75;
  }

  .content details > div p:last-child {
    margin-bottom: 0;
  }

  .content details code {
    font-size: 0.82em;
  }

  .content details pre {
    margin: 12px 0;
  }

  /* ── Chapter Nav ── */
  .chapter-nav {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .chapter-nav a {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
    flex: 1;
    max-width: 48%;
  }

  .chapter-nav a:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .chapter-nav a.next {
    text-align: right;
    margin-left: auto;
  }

  .chapter-nav .nav-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    font-family: var(--font-sans);
  }

  .chapter-nav .nav-title {
    font-size: 0.88rem;
    font-weight: 600;
    font-family: var(--font-sans);
  }

  /* ── Keyboard shortcut hint ── */
  .kbd-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    font-size: 0.68rem;
    color: var(--text-faint);
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0.7;
  }

  kbd {
    display: inline-block;
    padding: 1px 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg-sidebar);
  }

  /* ── Mobile ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 50;
  }

  .overlay.visible {
    display: block;
  }

  @media (max-width: 860px) {
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .menu-btn {
      display: block;
    }

    .topbar {
      padding: 12px 20px;
    }

    .content {
      padding: 32px 20px 100px;
    }

    .kbd-hint {
      display: none;
    }
  }

  /* ── Loading state ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-faint);
    font-size: 0.9rem;
  }

  .loading::after {
    content: '';
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin-left: 10px;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Scroll to top ── */
  .scroll-top {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 10;
    transition: opacity 0.15s;
  }

  .scroll-top.visible {
    display: flex;
  }

  .scroll-top:hover {
    opacity: 0.85;
  }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>RISC-V OS Guide</h1>
    <p>24 chapters &middot; from bare metal to shell</p>
  </div>
  <div class="sidebar-search">
    <input type="text" id="search" placeholder="Search chapters..." autocomplete="off" spellcheck="false">
  </div>
  <nav class="chapter-list" id="chapterList"></nav>
  <div class="sidebar-footer">
    <span id="progressText">0 / 24</span>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">Light / Dark</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">&#9776;</button>
      <div class="breadcrumb" id="breadcrumb">Loading...</div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progressBar"></div></div>
  <div class="content-scroll" id="contentScroll">
    <article class="content" id="content">
      <div class="loading">Loading</div>
    </article>
  </div>
</main>

<button class="scroll-top" id="scrollTop" aria-label="Scroll to top">&uarr;</button>

<script>
// ── Chapter data ──
const chapters = [
  { id: '00-toc', file: '00-toc.md', num: '00', title: 'Table of Contents', difficulty: '', part: 'Overview' },
  { id: 'ch01', file: 'ch01-development-environment.md', num: '01', title: 'Development Environment', difficulty: '1/5', part: 'Part I: Foundations' },
  { id: 'ch02', file: 'ch02-c-for-os-dev.md', num: '02', title: 'C for OS Development', difficulty: '2/5', part: 'Part I: Foundations' },
  { id: 'ch03', file: 'ch03-how-computers-boot.md', num: '03', title: 'How Computers Boot', difficulty: '2/5', part: 'Part I: Foundations' },
  { id: 'ch04', file: 'ch04-riscv-architecture.md', num: '04', title: 'The RISC-V Architecture', difficulty: '3/5', part: 'Part I: Foundations' },
  { id: 'ch05', file: 'ch05-first-boot.md', num: '05', title: 'First Boot', difficulty: '2/5', part: 'Part II: Bare Metal' },
  { id: 'ch06', file: 'ch06-uart-serial-output.md', num: '06', title: 'UART and Serial Output', difficulty: '2/5', part: 'Part II: Bare Metal' },
  { id: 'ch07', file: 'ch07-interrupts-and-traps.md', num: '07', title: 'Interrupts and Trap Handling', difficulty: '4/5', part: 'Part II: Bare Metal' },
  { id: 'ch08', file: 'ch08-timer-interrupts.md', num: '08', title: 'Timer Interrupts', difficulty: '3/5', part: 'Part II: Bare Metal' },
  { id: 'ch09', file: 'ch09-physical-memory.md', num: '09', title: 'Physical Memory Management', difficulty: '3/5', part: 'Part III: Memory' },
  { id: 'ch10', file: 'ch10-virtual-memory.md', num: '10', title: 'Virtual Memory and Paging', difficulty: '5/5', part: 'Part III: Memory' },
  { id: 'ch11', file: 'ch11-kernel-address-space.md', num: '11', title: 'Kernel Address Space Design', difficulty: '4/5', part: 'Part III: Memory' },
  { id: 'ch12', file: 'ch12-kernel-heap.md', num: '12', title: 'The Kernel Heap', difficulty: '3/5', part: 'Part III: Memory' },
  { id: 'ch13', file: 'ch13-processes.md', num: '13', title: 'What Is a Process?', difficulty: '3/5', part: 'Part IV: Processes' },
  { id: 'ch14', file: 'ch14-context-switching.md', num: '14', title: 'Context Switching', difficulty: '5/5', part: 'Part IV: Processes' },
  { id: 'ch15', file: 'ch15-scheduling.md', num: '15', title: 'Scheduling', difficulty: '3/5', part: 'Part IV: Processes' },
  { id: 'ch16', file: 'ch16-creating-processes.md', num: '16', title: 'Creating Processes', difficulty: '4/5', part: 'Part IV: Processes' },
  { id: 'ch17', file: 'ch17-privilege-separation.md', num: '17', title: 'Privilege Separation', difficulty: '4/5', part: 'Part V: Userspace' },
  { id: 'ch18', file: 'ch18-system-calls.md', num: '18', title: 'System Calls', difficulty: '4/5', part: 'Part V: Userspace' },
  { id: 'ch19', file: 'ch19-loading-programs.md', num: '19', title: 'Loading and Running Programs', difficulty: '4/5', part: 'Part V: Userspace' },
  { id: 'ch20', file: 'ch20-block-devices.md', num: '20', title: 'Block Devices and virtio', difficulty: '4/5', part: 'Part VI: Storage' },
  { id: 'ch21', file: 'ch21-filesystem.md', num: '21', title: 'A Simple Filesystem', difficulty: '4/5', part: 'Part VI: Storage' },
  { id: 'ch22', file: 'ch22-vfs-file-descriptors.md', num: '22', title: 'File Descriptors and the VFS', difficulty: '3/5', part: 'Part VI: Storage' },
  { id: 'ch23', file: 'ch23-libc-and-shell.md', num: '23', title: 'A Minimal C Library and Shell', difficulty: '3/5', part: 'Part VII: Putting It Together' },
  { id: 'ch24', file: 'ch24-where-to-go.md', num: '24', title: 'Where to Go From Here', difficulty: '1/5', part: 'Part VII: Putting It Together' },
];

const difficultyStars = d => {
  if (!d) return '';
  const n = parseInt(d);
  return '\u2605'.repeat(n) + '\u2606'.repeat(5 - n);
};

// ── State ──
let currentIndex = 0;
let readChapters = new Set(JSON.parse(localStorage.getItem('osguide-read') || '[]'));

function saveRead() {
  localStorage.setItem('osguide-read', JSON.stringify([...readChapters]));
}

// ── Build sidebar ──
function buildSidebar(filter = '') {
  const list = document.getElementById('chapterList');
  list.innerHTML = '';
  let currentPart = '';
  const lc = filter.toLowerCase();

  chapters.forEach((ch, i) => {
    const matches = !lc || ch.title.toLowerCase().includes(lc) || ch.num.includes(lc) || ch.part.toLowerCase().includes(lc);

    if (ch.part !== currentPart) {
      currentPart = ch.part;
      if (!lc || chapters.some((c, j) => c.part === currentPart && (!lc || c.title.toLowerCase().includes(lc) || c.num.includes(lc)))) {
        const label = document.createElement('div');
        label.className = 'part-label';
        label.textContent = currentPart;
        list.appendChild(label);
      }
    }

    const el = document.createElement('div');
    el.className = 'chapter-item' + (i === currentIndex ? ' active' : '') + (!matches ? ' hidden' : '');
    el.dataset.index = i;
    el.innerHTML = `
      <span class="ch-num">${ch.num}</span>
      <div class="ch-info">
        <div class="ch-title">${ch.title}</div>
        ${ch.difficulty ? `<div class="ch-difficulty">${difficultyStars(ch.difficulty)}</div>` : ''}
      </div>
    `;
    el.addEventListener('click', () => navigateTo(i));
    list.appendChild(el);
  });

  updateProgress();
}

function updateProgress() {
  const count = readChapters.size;
  document.getElementById('progressText').textContent = `${count} / ${chapters.length - 1} read`;
}

// ── Markdown rendering ──
function renderMarkdown(md) {
  // Simple but solid markdown renderer — no external deps
  let html = md;

  // Normalize line endings
  html = html.replace(/\r\n/g, '\n');

  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<pre><code class="language-${lang}">${escaped}</code></pre>`;
  });

  // Preserve HTML blocks (details, code blocks) from paragraph wrapping
  const preserved = [];
  // Preserve details blocks first
  html = html.replace(/<details[\s\S]*?<\/details>/g, m => {
    preserved.push(m);
    return `\x00PRESERVED${preserved.length - 1}\x00`;
  });
  // Preserve code blocks
  html = html.replace(/<pre><code[\s\S]*?<\/code><\/pre>/g, m => {
    preserved.push(m);
    return `\x00PRESERVED${preserved.length - 1}\x00`;
  });

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
    const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  html = html.replace(/^---+$/gm, '<hr>');
  html = html.replace(/^\*\*\*+$/gm, '<hr>');

  // Blockquotes
  html = html.replace(/^(?:>\s?.+\n?)+/gm, match => {
    const inner = match.replace(/^>\s?/gm, '');
    return `<blockquote>${inner}</blockquote>`;
  });

  // Unordered lists
  html = html.replace(/^(?:- .+\n?(?:  .+\n?)*)+/gm, match => {
    const items = match.split(/^- /gm).filter(Boolean).map(item => `<li>${item.trim()}</li>`);
    return `<ul>${items.join('')}</ul>`;
  });

  // Ordered lists
  html = html.replace(/^(?:\d+\. .+\n?(?:   .+\n?)*)+/gm, match => {
    const items = match.split(/^\d+\. /gm).filter(Boolean).map(item => `<li>${item.trim()}</li>`);
    return `<ol>${items.join('')}</ol>`;
  });

  // Inline code
  html = html.replace(/`([^`\n]+?)`/g, '<code>$1</code>');

  // Bold + italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

  // Paragraphs — wrap loose text lines
  html = html.replace(/^(?!<[a-z/]|$|\x00)(.+)$/gm, '<p>$1</p>');

  // Collapse consecutive <p> tags that should be one paragraph
  html = html.replace(/<\/p>\n<p>/g, '<br>');

  // Restore preserved blocks (details, code)
  html = html.replace(/\x00PRESERVED(\d+)\x00/g, (_, i) => preserved[i]);

  return html;
}

// ── Navigation ──
async function navigateTo(index) {
  if (index < 0 || index >= chapters.length) return;
  currentIndex = index;
  const ch = chapters[index];

  // Update URL hash
  history.replaceState(null, '', `#${ch.id}`);

  // Update sidebar active
  document.querySelectorAll('.chapter-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  // Scroll sidebar item into view
  const activeItem = document.querySelector('.chapter-item.active');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });

  // Update breadcrumb
  document.getElementById('breadcrumb').innerHTML =
    `${ch.part} &rsaquo; <span>Chapter ${ch.num}: ${ch.title}</span>`;

  // Show loading
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = '<div class="loading">Loading</div>';

  // Fetch and render
  try {
    const resp = await fetch(ch.file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const md = await resp.text();
    const html = renderMarkdown(md);

    // Build chapter nav
    let nav = '<div class="chapter-nav">';
    if (index > 0) {
      const prev = chapters[index - 1];
      nav += `<a href="#" class="prev" data-index="${index - 1}">
        <span class="nav-label">&larr; Previous</span>
        <span class="nav-title">${prev.title}</span>
      </a>`;
    }
    if (index < chapters.length - 1) {
      const next = chapters[index + 1];
      nav += `<a href="#" class="next" data-index="${index + 1}">
        <span class="nav-label">Next &rarr;</span>
        <span class="nav-title">${next.title}</span>
      </a>`;
    }
    nav += '</div>';

    contentEl.innerHTML = html + nav;

    // Bind nav links
    contentEl.querySelectorAll('.chapter-nav a').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        navigateTo(parseInt(a.dataset.index));
      });
    });

    // Mark as read
    if (ch.num !== '00') {
      readChapters.add(ch.id);
      saveRead();
      updateProgress();
    }

  } catch (e) {
    contentEl.innerHTML = `
      <h1>Could not load chapter</h1>
      <p>Make sure you're running a local server from the <code>os-guide</code> directory:</p>
      <pre><code>cd ~/Desktop/os-guide
python3 -m http.server 3000</code></pre>
      <p>Then open <a href="http://localhost:3000">http://localhost:3000</a></p>
      <p style="color:var(--text-faint);font-size:0.85rem;margin-top:24px;">Error: ${e.message}</p>
    `;
  }

  // Scroll to top
  document.getElementById('contentScroll').scrollTop = 0;

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

// ── Reading progress bar ──
document.getElementById('contentScroll').addEventListener('scroll', () => {
  const el = document.getElementById('contentScroll');
  const pct = el.scrollHeight <= el.clientHeight ? 100 :
    (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  // Scroll-to-top button
  document.getElementById('scrollTop').classList.toggle('visible', el.scrollTop > 400);
});

document.getElementById('scrollTop').addEventListener('click', () => {
  document.getElementById('contentScroll').scrollTo({ top: 0, behavior: 'smooth' });
});

// ── Search ──
document.getElementById('search').addEventListener('input', e => {
  buildSidebar(e.target.value);
});

// ── Theme ──
function setTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  localStorage.setItem('osguide-theme', dark ? 'dark' : 'light');
}

document.getElementById('themeToggle').addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  setTheme(!isDark);
});

// ── Mobile menu ──
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
});

document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
});

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  // Don't capture when typing in search
  if (document.activeElement.tagName === 'INPUT') return;

  if (e.key === 'ArrowLeft' || e.key === 'p') {
    navigateTo(currentIndex - 1);
  } else if (e.key === 'ArrowRight' || e.key === 'n') {
    navigateTo(currentIndex + 1);
  } else if (e.key === '/') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// ── Init ──
const savedTheme = localStorage.getItem('osguide-theme');
if (savedTheme === 'dark' || (!savedTheme && matchMedia('(prefers-color-scheme: dark)').matches)) {
  setTheme(true);
}

buildSidebar();

// Load from hash or default to TOC
const hash = location.hash.replace('#', '');
const startIndex = hash ? chapters.findIndex(c => c.id === hash) : 0;
navigateTo(startIndex >= 0 ? startIndex : 0);
</script>
